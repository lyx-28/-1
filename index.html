<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌游戏 - Memory Card Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .game-cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .game-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .game-card .version {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .game-card .features {
            color: #666;
            font-size: 0.9rem;
            text-align: left;
            line-height: 1.8;
        }

        .game-card .features li {
            list-style: none;
            padding-left: 20px;
            position: relative;
        }

        .game-card .features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #4ecdc4;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 30px 20px;
            }

            .game-cards {
                gap: 20px;
            }

            .game-card {
                padding: 20px;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 记忆翻牌游戏</h1>
        <p class="subtitle">Memory Card Game Collection</p>
        
        <div class="game-cards">
            <div class="game-card" onclick="window.location.href='./classic/'">
                <h2>经典版</h2>
                <div class="version">v1.0</div>
                <ul class="features">
                    <li>基础翻牌玩法</li>
                    <li>计时与步数统计</li>
                    <li>得分系统</li>
                    <li>通关弹窗</li>
                </ul>
            </div>

            <div class="game-card" onclick="window.location.href='./enhanced/'">
                <h2>升级版</h2>
                <div class="version">v2.0</div>
                <ul class="features">
                    <li>多种难度选择</li>
                    <li>主题皮肤切换</li>
                    <li>音效系统</li>
                    <li>本地排行榜</li>
                    <li>暂停/继续功能</li>
                    <li>动画效果</li>
                </ul>
            </div>
        </div>

        <div class="footer">
            <p>点击卡片选择游戏版本</p>
        </div>
    </div>
</body>
</html>
